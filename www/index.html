<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Turco-Mahjong: İstanbul Seviyeleri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --game-width: 900;
            --game-height: 506.25;
        }

        body {
            background: radial-gradient(circle, #1a365d 0%, #000 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        #game-viewport {
            position: relative;
            width: 900px;
            height: 506px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease-out;
            transform-origin: center;
        }

        .board {
            position: relative;
            width: 900px;
            height: 400px;
            perspective: 1000px;
            margin-top: 60px;
        }

        .tile {
            position: absolute;
            width: 50px;
            height: 68px;
            background: #fdf6e3;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 0 #d9c7a1, 0 5px 8px rgba(0,0,0,0.5);
            transition: all 0.1s ease-out;
            user-select: none;
            font-size: 1.8rem;
            border: 1px solid #e6d5b3;
            -webkit-tap-highlight-color: transparent;
        }

        .tile.selected {
            background: #ffeb3b;
            box-shadow: 0 0 15px #ffeb3b, 0 3px 0 #c0b000;
            transform: translateY(-5px);
            z-index: 1000 !important;
        }

        .tile.blocked {
            filter: brightness(0.5) grayscale(0.7);
            cursor: not-allowed;
        }

        .ui-panel {
            position: absolute;
            top: -20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 100;
            width: 100%;
        }

        .status-msg {
            position: fixed;
            bottom: 20px;
            background: rgba(0,0,0,0.85);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid #4a5568;
            font-size: 0.9rem;
            z-index: 2000;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            display: none;
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <div class="ui-panel">
        <div class="bg-blue-900/80 p-2 rounded-xl border border-blue-400/50 flex flex-col items-center min-w-[100px]">
            <span id="level-name" class="text-blue-200 text-[10px] font-bold uppercase tracking-wider">Başlıyor...</span>
            <div class="flex gap-2 items-baseline">
                <span id="tile-count" class="text-lg font-black text-white">0</span>
                <span class="text-[9px] text-blue-300">TAŞ KALDI</span>
            </div>
        </div>
        <button onclick="getOfflineFact()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded-lg font-bold transition shadow-lg flex items-center gap-1 border border-indigo-400 text-xs">
            ✨ Bilgi
        </button>
        <button onclick="shuffleBoard()" class="bg-orange-600 hover:bg-orange-500 px-3 py-2 rounded-lg font-bold transition shadow-lg text-xs">Karıştır</button>
        <button onclick="restartLevel()" class="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg font-bold transition shadow-lg text-xs">Baştan</button>
    </div>

    <div id="board" class="board"></div>
</div>

<div id="status" class="status-msg"></div>

<!-- Çevrimdışı Bilgi Modalı -->
<div id="fact-modal" class="modal">
    <div class="bg-slate-900 text-white p-6 rounded-2xl text-center max-w-[85%] shadow-2xl border border-indigo-500/50 relative">
        <button onclick="closeFactModal()" class="absolute top-2 right-4 text-2xl font-bold text-gray-500 hover:text-white">&times;</button>
        <div id="fact-icon" class="text-5xl mb-3">✨</div>
        <h2 id="fact-title" class="text-lg font-bold mb-2 text-indigo-300">İstanbul Sırları</h2>
        <div id="fact-content" class="text-sm text-slate-200 font-medium min-h-[60px] flex items-center justify-center"></div>
    </div>
</div>

<!-- Kazanç Modalı -->
<div id="win-modal" class="modal">
    <div class="bg-white text-black p-8 rounded-3xl text-center max-w-[80%] shadow-2xl border-4 border-orange-400">
        <div class="text-5xl mb-3">🧿</div>
        <h2 id="modal-title" class="text-2xl font-bold mb-2 text-blue-900">Tebrikler!</h2>
        <div id="modal-desc" class="mb-6 text-gray-600 text-sm italic min-h-[50px] flex flex-col items-center justify-center"></div>
        <button id="modal-btn" onclick="nextLevel()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition">Devam Et</button>
    </div>
</div>

<script>
    // --- GENİŞ ÇEVRİMDIŞI VERİ HAVUZU ---
    const OFFLINE_DATA = {
        facts: {
            '☕': ["İnce belli bardakta tavşan kanı çay, İstanbul sabahlarının ruhudur.", "Demli bir çay ve Boğaz manzarası, dünyanın en ucuz lüksüdür.", "Çay, İstanbul'da sadece bir içecek değil, bir dostluk bahanesidir."],
            '🥨': ["Çıtır çıtır simit ve yanına üçgen peynir; işte gerçek İstanbul gurmesi!", "Vapurda martılarla paylaşılan bir simit, İstanbul'un en eski geleneğidir.", "Sokak simitçisinin sesi, İstanbul'un en tanıdık şarkısıdır."],
            '🐱': ["İstanbul'un gerçek sahipleri kediler, her köşebaşında sizi selamlar.", "Ayasofya'dan Moda'ya, her mahallenin ünlü bir kedi muhtarı vardır.", "İstanbul kedileri, şehrin kaosu içinde huzurun temsilcileridir."],
            '🧿': ["Mavi bir nazar boncuğu, kötülükleri savuşturan en eski Anadolu tılsımıdır.", "Bereketi ve şansı simgeleyen bu mavi göz, asırlardır evlerimizin baş köşesindedir.", "Nazar değmesin diye takılan bu boncuk, bir kültür mirasıdır."],
            '🌷': ["Asaletin simgesi lale, Osmanlı'dan günümüze İstanbul'un zarif çiçeğidir.", "Nisan ayı geldiğinde Emirgan Korusu bir lale denizine dönüşür.", "Lale, sadece bir çiçek değil, bir devrin ve bir sanatın adıdır."],
            '⛴️': ["Kıtalar arası yolculuğun en keyifli yolu, bir vapur güvertesidir.", "Vapurun arkasında bıraktığı beyaz köpükler, İstanbul'un en güzel izidir.", "Siren sesi duyulduğunda, İstanbul'un kalbi vapurla birlikte atar."],
            '🍮': ["Kırk kat yufka ve bol fıstık; baklava damakların en büyük bayramıdır.", "Gaziantep'ten İstanbul'a uzanan bu lezzet yolculuğu, tatlı bir mirastır.", "Şerbetin hamurla dansı olan baklava, Türk mutfağının baş tacıdır."],
            '🎲': ["Tavla, İstanbul kahvehanelerinde çekişmeli sohbetlerin ortağıdır.", "Düşeş geldiğinde atılan o sevinç çığlığı, oyunun ruhudur.", "Tavla bilmek, İstanbul kültürünün yazılı olmayan kurallarından biridir."],
            '🗼': ["Galata Kulesi, yüzyıllardır aşıklara İstanbul'un masallarını fısıldar.", "Hezarfen'in kanat çırptığı bu kule, özgürlüğün simgesidir.", "Galata'nın zirvesinden bakınca, tüm İstanbul ayaklarınızın altına serilir."],
            '🥤': ["Bol köpüklü, buz gibi bir ayran; her yemeğin en sadık eşlikçisidir.", "Anadolu'nun geleneksel ferahlığı ayran, sağlığın ve doğallığın sembolüdür.", "Milli içeceğimiz ayran, yaz sıcaklarının en serin sığınağıdır."]
        },
        congrats: [
            "İstanbul'un fatihi gibi ilerliyorsun! Harika iş!",
            "Moda'dan başladın, Galata'ya kadar estin geçtin!",
            "Taşları tıpkı bir usta gibi birer birer temizledin.",
            "Şehrin yedi tepesi de senin başarını kutluyor!",
            "Hızın ve dikkatin hayranlık uyandırıcı, tebrikler!",
            "Boğaz'ın serinliği gibi ferahlatıcı bir galibiyet!"
        ]
    };

    const TURKISH_ICONS = [
        { char: '☕', name: 'Türk Çayı' }, { char: '🥨', name: 'Simit' },
        { char: '🐱', name: 'İstanbul Kedisi' }, { char: '🧿', name: 'Nazar Boncuğu' },
        { char: '🌷', name: 'Lale' }, { char: '⛴️', name: 'Vapur' },
        { char: '🍮', name: 'Baklava' }, { char: '🎲', name: 'Tavla' },
        { char: '🗼', name: 'Galata Kulesi' }, { char: '🥤', name: 'Ayran' }
    ];

    const LEVELS = [
        { name: "Moda Sahili", layers: 1, rows: 4, cols: 6, spacingX: 60, spacingY: 75 },
        { name: "Kız Kulesi", layers: 1, rows: 5, cols: 8, spacingX: 55, spacingY: 72 },
        { name: "Galata Rüzgarı", layers: 2, rows: 4, cols: 7, spacingX: 58, spacingY: 74 },
        { name: "Tarihi Yarımada", layers: 3, rows: 4, cols: 8, spacingX: 55, spacingY: 70 }
    ];

    let currentLevelIdx = 0;
    let tiles = [];
    let selectedTile = null;

    function updateScale() {
        const viewport = document.getElementById('game-viewport');
        const finalScale = Math.min(window.innerWidth / 900, window.innerHeight / 506) * 0.95;
        viewport.style.transform = `scale(${finalScale})`;
    }
    window.addEventListener('resize', updateScale);

    function getOfflineFact() {
        if (!selectedTile) { showMessage("Bir taş seçin! 👆"); return; }
        const iconInfo = TURKISH_ICONS.find(i => i.char === selectedTile.symbol);
        const factList = OFFLINE_DATA.facts[selectedTile.symbol] || ["İstanbul'un her köşesi ayrı bir hikayedir."];
        const randomFact = factList[Math.floor(Math.random() * factList.length)];
        
        document.getElementById('fact-modal').style.display = 'flex';
        document.getElementById('fact-icon').innerText = selectedTile.symbol;
        document.getElementById('fact-title').innerText = iconInfo ? iconInfo.name : "İstanbul Sırrı";
        document.getElementById('fact-content').innerHTML = `<p>${randomFact}</p>`;
    }

    function closeFactModal() { document.getElementById('fact-modal').style.display = 'none'; }

    function showWinModal() {
        const modal = document.getElementById('win-modal');
        const desc = document.getElementById('modal-desc');
        const randomCongrats = OFFLINE_DATA.congrats[Math.floor(Math.random() * OFFLINE_DATA.congrats.length)];
        
        modal.style.display = 'flex';
        desc.innerHTML = `<p>"${randomCongrats}"</p>`;
    }

    function generateLayout(idx) {
        const config = LEVELS[idx];
        const layout = [];
        for(let z = 0; z < config.layers; z++) {
            let r_max = config.rows - z;
            let c_max = config.cols - z;
            const ox = (900 - (c_max * config.spacingX)) / 2;
            const oy = (400 - (r_max * config.spacingY)) / 2 + 30;
            for(let r = 0; r < r_max; r++) {
                for(let c = 0; c < c_max; c++) {
                    layout.push({ x: c * config.spacingX + ox, y: r * config.spacingY + oy, z: z });
                }
            }
        }
        if (layout.length % 2 !== 0) layout.pop();
        const symbols = [];
        for(let i = 0; i < layout.length / 2; i++) {
            const s = TURKISH_ICONS[Math.floor(Math.random()*TURKISH_ICONS.length)].char;
            symbols.push(s, s);
        }
        symbols.sort(() => Math.random() - 0.5);
        return layout.map((p, i) => ({ ...p, id: i, symbol: symbols[i], removed: false }));
    }

    function isFree(tile, all) {
        const active = all.filter(t => !t.removed && t.id !== tile.id);
        const above = active.some(t => t.z > tile.z && Math.abs(t.x-tile.x) < 40 && Math.abs(t.y-tile.y) < 50);
        if (above) return false;
        const left = active.some(t => t.z === tile.z && Math.abs(t.y-tile.y) < 10 && t.x < tile.x && t.x > tile.x - 55);
        const right = active.some(t => t.z === tile.z && Math.abs(t.y-tile.y) < 10 && t.x > tile.x && t.x < tile.x + 55);
        return !left || !right;
    }

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const active = tiles.filter(t => !t.removed);
        document.getElementById('tile-count').innerText = active.length;
        if (active.length === 0 && tiles.length > 0) { showWinModal(); return; }

        tiles.forEach(t => {
            if (t.removed) return;
            const el = document.createElement('div');
            el.className = `tile ${isFree(t, tiles) ? '' : 'blocked'} ${selectedTile?.id === t.id ? 'selected' : ''}`;
            el.style.left = t.x + 'px'; el.style.top = t.y + 'px'; el.style.zIndex = t.z * 10;
            el.innerText = t.symbol;
            el.onclick = () => {
                if (!isFree(t, tiles)) return;
                if (selectedTile && selectedTile.id !== t.id && selectedTile.symbol === t.symbol) {
                    t.removed = true; selectedTile.removed = true; selectedTile = null;
                } else {
                    selectedTile = (selectedTile?.id === t.id) ? null : t;
                }
                render();
            };
            board.appendChild(el);
        });
    }

    function startLevel(i) {
        currentLevelIdx = i;
        document.getElementById('win-modal').style.display = 'none';
        document.getElementById('level-name').innerText = LEVELS[i].name;
        tiles = generateLayout(i);
        selectedTile = null;
        render();
        updateScale();
    }

    function nextLevel() { startLevel((currentLevelIdx + 1) % LEVELS.length); }
    function restartLevel() { startLevel(currentLevelIdx); }
    function shuffleBoard() {
        const active = tiles.filter(t => !t.removed);
        const syms = active.map(t => t.symbol).sort(() => Math.random() - 0.5);
        let sIdx = 0;
        tiles.forEach(t => { if(!t.removed) t.symbol = syms[sIdx++]; });
        selectedTile = null; render();
    }

    function showMessage(m) {
        const s = document.getElementById('status'); s.innerText = m; s.style.opacity = 1;
        setTimeout(() => s.style.opacity = 0, 1500);
    }

    window.onload = () => startLevel(0);
</script>
</body>
</html>
