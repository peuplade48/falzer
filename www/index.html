<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Turco-Mahjong: İstanbul Seviyeleri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --game-width: 900;
            --game-height: 506.25;
        }

        body {
            background: radial-gradient(circle, #1a365d 0%, #000 100%);
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        #game-viewport {
            position: relative;
            width: 900px;
            height: 506px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease-out;
            transform-origin: center;
        }

        .board {
            position: relative;
            width: 900px;
            height: 400px;
            perspective: 1000px;
            margin-top: 60px;
        }

        .tile {
            position: absolute;
            width: 50px;
            height: 68px;
            background: #fdf6e3;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 0 #d9c7a1, 0 5px 8px rgba(0,0,0,0.5);
            transition: all 0.1s ease-out;
            user-select: none;
            font-size: 1.8rem;
            border: 1px solid #e6d5b3;
            -webkit-tap-highlight-color: transparent;
        }

        .tile.selected {
            background: #ffeb3b;
            box-shadow: 0 0 15px #ffeb3b, 0 3px 0 #c0b000;
            transform: translateY(-5px);
            z-index: 1000 !important;
        }

        .tile.blocked {
            filter: brightness(0.5) grayscale(0.7);
            cursor: not-allowed;
        }

        .ui-panel {
            position: absolute;
            top: -20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 100;
            width: 100%;
        }

        .status-msg {
            position: fixed;
            bottom: 20px;
            background: rgba(0,0,0,0.85);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid #4a5568;
            font-size: 0.9rem;
            z-index: 2000;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            display: none;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="game-viewport">
    <div class="ui-panel">
        <div class="bg-blue-900/80 p-2 rounded-xl border border-blue-400/50 flex flex-col items-center min-w-[100px]">
            <span id="level-name" class="text-blue-200 text-[10px] font-bold uppercase tracking-wider">Yükleniyor...</span>
            <div class="flex gap-2 items-baseline">
                <span id="tile-count" class="text-lg font-black text-white">0</span>
                <span class="text-[9px] text-blue-300">TAŞ KALDI</span>
            </div>
        </div>
        <button onclick="getAIFact()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded-lg font-bold transition shadow-lg flex items-center gap-1 border border-indigo-400 text-xs">
            ✨ Bilgi
        </button>
        <button onclick="shuffleBoard()" class="bg-orange-600 hover:bg-orange-500 px-3 py-2 rounded-lg font-bold transition shadow-lg text-xs">Karıştır</button>
        <button onclick="restartLevel()" class="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg font-bold transition shadow-lg text-xs">Baştan</button>
    </div>

    <div id="board" class="board"></div>
</div>

<div id="status" class="status-msg"></div>

<!-- Bilgi Modalı -->
<div id="fact-modal" class="modal">
    <div class="bg-slate-900 text-white p-6 rounded-2xl text-center max-w-[85%] shadow-2xl border border-indigo-500/50 relative">
        <button onclick="closeFactModal()" class="absolute top-2 right-4 text-2xl font-bold text-gray-500 hover:text-white">&times;</button>
        <div id="fact-icon" class="text-5xl mb-3">✨</div>
        <h2 id="fact-title" class="text-lg font-bold mb-2 text-indigo-300">İstanbul Sırları</h2>
        <div id="fact-content" class="text-sm text-slate-200 font-medium min-h-[60px] flex items-center justify-center"></div>
    </div>
</div>

<!-- Kazanç Modalı -->
<div id="win-modal" class="modal">
    <div class="bg-white text-black p-8 rounded-3xl text-center max-w-[80%] shadow-2xl border-4 border-orange-400">
        <div class="text-5xl mb-3">🧿</div>
        <h2 id="modal-title" class="text-2xl font-bold mb-2 text-blue-900">Harika!</h2>
        <div id="modal-desc" class="mb-6 text-gray-600 text-sm italic min-h-[50px] flex flex-col items-center justify-center"></div>
        <button id="modal-btn" onclick="nextLevel()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition">Devam Et</button>
    </div>
</div>

<script>
    const apiKey = ""; 

    // --- HIZLI YANIT İÇİN OPTİMİZE EDİLMİŞ API ÇAĞRISI ---
    async function callGeminiAPI(prompt, systemInstructionText, timeout = 5000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: systemInstructionText }] },
            generationConfig: { maxOutputTokens: 50, temperature: 0.7 } // Kısa ve hızlı yanıt için
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(timer);
            if (!response.ok) throw new Error("API Hatası");
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            return null; // Zaman aşımı veya hata durumunda null dön
        }
    }

    const TURKISH_ICONS = [
        { char: '☕', name: 'Türk Çayı', fallback: "İnce belli bardakta tavşan kanı çay, İstanbul sabahlarının vazgeçilmezidir." },
        { char: '🥨', name: 'Simit', fallback: "Çıtır çıtır simit ve yanına bir parça peynir; işte gerçek bir İstanbul kahvaltısı." },
        { char: '🐱', name: 'İstanbul Kedisi', fallback: "İstanbul'un gerçek sahipleri olan kediler, her sokak başında sizi bekler." },
        { char: '🧿', name: 'Nazar Boncuğu', fallback: "Mavi gözlü bu tılsım, asırlardır Anadolu'da kötü enerjiden korunmak için kullanılır." },
        { char: '🌷', name: 'Lale', fallback: "Asaletin simgesi lale, bahar geldiğinde İstanbul parklarını renk cümbüşüne çevirir." },
        { char: '⛴️', name: 'Vapur', fallback: "Martıların eşliğinde kıtalar arası yolculuk, sadece İstanbul'a has bir keyiftir." },
        { char: '🍮', name: 'Baklava', fallback: "İncecik hamur ve bol fıstık; Türk mutfağının dünyaya armağanıdır." },
        { char: '🎲', name: 'Tavla', fallback: "Mahalle kahvelerinin vazgeçilmezi olan tavla, sadece bir oyun değil, bir sohbettir." },
        { char: '🗼', name: 'Galata Kulesi', fallback: "Şehrin en eski bekçisi Galata, yüzyıllardır aşıklara İstanbul'u izletir." },
        { char: '🥤', name: 'Ayran', fallback: "Bol köpüklü buz gibi bir ayran, her yemeğin en sadık dostudur." }
    ];

    const LEVELS = [
        { name: "Moda Sahili", layers: 1, rows: 4, cols: 6, spacingX: 60, spacingY: 75 },
        { name: "Kız Kulesi", layers: 1, rows: 5, cols: 8, spacingX: 55, spacingY: 72 },
        { name: "Galata Rüzgarı", layers: 2, rows: 4, cols: 7, spacingX: 58, spacingY: 74 },
        { name: "Tarihi Yarımada", layers: 3, rows: 4, cols: 8, spacingX: 55, spacingY: 70 }
    ];

    let currentLevelIdx = 0;
    let tiles = [];
    let selectedTile = null;

    function updateScale() {
        const viewport = document.getElementById('game-viewport');
        const finalScale = Math.min(window.innerWidth / 900, window.innerHeight / 506) * 0.95;
        viewport.style.transform = `scale(${finalScale})`;
    }
    window.addEventListener('resize', updateScale);

    async function getAIFact() {
        if (!selectedTile) { showMessage("Bir taş seçin! 👆"); return; }
        const icon = TURKISH_ICONS.find(i => i.char === selectedTile.symbol) || TURKISH_ICONS[0];
        
        const modal = document.getElementById('fact-modal');
        const content = document.getElementById('fact-content');
        modal.style.display = 'flex';
        document.getElementById('fact-icon').innerText = selectedTile.symbol;
        document.getElementById('fact-title').innerText = icon.name;
        content.innerHTML = '<div class="loader"></div>';

        // Beklerken bir yandan istek at, bir yandan fallback hazır tut
        const resp = await callGeminiAPI(`${icon.name} hakkında İstanbul temalı çok kısa bilgi ver.`, "Hızlı ve şairane ol.");
        content.innerHTML = `<p>${resp || icon.fallback}</p>`;
    }

    function closeFactModal() { document.getElementById('fact-modal').style.display = 'none'; }

    async function showWinModal() {
        const modal = document.getElementById('win-modal');
        const desc = document.getElementById('modal-desc');
        const btn = document.getElementById('modal-btn');
        modal.style.display = 'flex';
        btn.classList.add('opacity-50', 'pointer-events-none');
        desc.innerHTML = '<div class="flex flex-col items-center"><div class="loader mb-2"></div><span class="text-[10px] text-blue-500 animate-pulse">İstanbul Ruhu Çağrılıyor...</span></div>';

        const isLast = currentLevelIdx >= LEVELS.length - 1;
        const prompt = isLast ? "Oyun bitti tebrik mesajı yaz." : `${LEVELS[currentLevelIdx].name} bitti kutlama yaz.`;
        
        const resp = await callGeminiAPI(prompt, "Sadece 1 kısa cümlelik tebrik yaz.");
        desc.innerHTML = `<p>"${resp || (isLast ? "İstanbul'un fatihi oldun!" : "Harika bir duraktı, yolculuğa devam!")}"</p>`;
        
        btn.classList.remove('opacity-50', 'pointer-events-none');
    }

    function generateLayout(idx) {
        const config = LEVELS[idx];
        const layout = [];
        for(let z = 0; z < config.layers; z++) {
            let r_max = config.rows - z;
            let c_max = config.cols - z;
            const ox = (900 - (c_max * config.spacingX)) / 2;
            const oy = (400 - (r_max * config.spacingY)) / 2 + 30;
            for(let r = 0; r < r_max; r++) {
                for(let c = 0; c < c_max; c++) {
                    layout.push({ x: c * config.spacingX + ox, y: r * config.spacingY + oy, z: z });
                }
            }
        }
        if (layout.length % 2 !== 0) layout.pop();
        const symbols = [];
        for(let i = 0; i < layout.length / 2; i++) {
            const s = TURKISH_ICONS[Math.floor(Math.random()*TURKISH_ICONS.length)].char;
            symbols.push(s, s);
        }
        symbols.sort(() => Math.random() - 0.5);
        return layout.map((p, i) => ({ ...p, id: i, symbol: symbols[i], removed: false }));
    }

    function isFree(tile, all) {
        const active = all.filter(t => !t.removed && t.id !== tile.id);
        const above = active.some(t => t.z > tile.z && Math.abs(t.x-tile.x) < 40 && Math.abs(t.y-tile.y) < 50);
        if (above) return false;
        const left = active.some(t => t.z === tile.z && Math.abs(t.y-tile.y) < 10 && t.x < tile.x && t.x > tile.x - 55);
        const right = active.some(t => t.z === tile.z && Math.abs(t.y-tile.y) < 10 && t.x > tile.x && t.x < tile.x + 55);
        return !left || !right;
    }

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const active = tiles.filter(t => !t.removed);
        document.getElementById('tile-count').innerText = active.length;
        if (active.length === 0 && tiles.length > 0) { showWinModal(); return; }

        tiles.forEach(t => {
            if (t.removed) return;
            const el = document.createElement('div');
            el.className = `tile ${isFree(t, tiles) ? '' : 'blocked'} ${selectedTile?.id === t.id ? 'selected' : ''}`;
            el.style.left = t.x + 'px'; el.style.top = t.y + 'px'; el.style.zIndex = t.z * 10;
            el.innerText = t.symbol;
            el.onclick = () => {
                if (!isFree(t, tiles)) return;
                if (selectedTile && selectedTile.id !== t.id && selectedTile.symbol === t.symbol) {
                    t.removed = true; selectedTile.removed = true; selectedTile = null;
                } else {
                    selectedTile = (selectedTile?.id === t.id) ? null : t;
                }
                render();
            };
            board.appendChild(el);
        });
    }

    function startLevel(i) {
        currentLevelIdx = i;
        document.getElementById('win-modal').style.display = 'none';
        document.getElementById('level-name').innerText = LEVELS[i].name;
        tiles = generateLayout(i);
        selectedTile = null;
        render();
        updateScale();
    }

    function nextLevel() { startLevel((currentLevelIdx + 1) % LEVELS.length); }
    function restartLevel() { startLevel(currentLevelIdx); }
    function shuffleBoard() {
        const active = tiles.filter(t => !t.removed);
        const syms = active.map(t => t.symbol).sort(() => Math.random() - 0.5);
        let sIdx = 0;
        tiles.forEach(t => { if(!t.removed) t.symbol = syms[sIdx++]; });
        selectedTile = null; render();
    }

    function showMessage(m) {
        const s = document.getElementById('status'); s.innerText = m; s.style.opacity = 1;
        setTimeout(() => s.style.opacity = 0, 1500);
    }

    window.onload = () => startLevel(0);
</script>
</body>
</html>
